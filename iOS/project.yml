name: Cigarbox
options:
  bundleIdPrefix: com.shimondeitel.cigarboxapp
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Cigarbox:
    type: application
    platform: iOS
    sources:
      - path: Cigarbox
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.cigarboxapp
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Cigarbox/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  CigarboxTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CigarboxTests
      - path: Cigarbox.storekit
    dependencies:
      - target: Cigarbox
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.cigarboxapp.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  CigarboxUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: CigarboxUITests
    dependencies:
      - target: Cigarbox
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.cigarboxapp.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Cigarbox:
    build:
      targets:
        Cigarbox: all
        CigarboxTests: [test]
        CigarboxUITests: [test]
    test:
      targets:
        - CigarboxTests
        - CigarboxUITests
